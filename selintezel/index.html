<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#5d8fc8" />
  <title>Selin Tezel — e-commint</title>
  <meta name="description" content="Selin Tezel iletişim kartı — e-commint" />
  <link rel="icon" href="../public/selin.jpeg" />
  <link rel="stylesheet" href="../assets/style.css" />
</head>
<body>
  <main class="card">
    <section class="hero">
      <img class="avatar" src="../public/selin.jpeg" alt="Selin Tezel" />
      <h1 class="name">Selin Tezel</h1>
      <p class="title">e-commint</p>

      <div class="mail-badge" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="5" width="18" height="14" rx="2" />
          <path d="M3 7l9 6 9-6" />
        </svg>
      </div>
    </section>

    <section class="content">
      <a class="info-card" href="mailto:selin.tezel@e-commint.com">
        <div class="icon-circle mail">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="5" width="18" height="14" rx="2" />
            <path d="M3 7l9 6 9-6" />
          </svg>
        </div>
        <div class="info-text">
          <div class="info-label">E-posta</div>
          <div class="info-value">selin.tezel@e-commint.com</div>
        </div>
      </a>

      <h2 class="section-title">Beni takip edin</h2>

      <a class="info-card" href="https://www.linkedin.com/in/selintezelegitim" target="_blank" rel="noopener">
        <div class="icon-circle linkedin">
          <svg viewBox="0 0 24 24">
            <path d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14zM8.34 18.34V10.5H5.67v7.84h2.67zM7 9.34a1.55 1.55 0 1 0 0-3.1 1.55 1.55 0 0 0 0 3.1zm11.34 9V13.9c0-2.5-1.34-3.66-3.13-3.66-1.45 0-2.1.8-2.46 1.36V10.5h-2.67c.04.76 0 7.84 0 7.84h2.67v-4.38c0-.24.02-.48.09-.66.2-.48.63-.97 1.36-.97.96 0 1.34.73 1.34 1.8v4.21h2.8z"/>
          </svg>
        </div>
        <div class="info-text">
          <div class="info-value">LinkedIn</div>
          <div class="info-sub">selintezelegitim</div>
        </div>
        <span class="arrow">→</span>
      </a>

      <a class="info-card" href="https://e-commint.com/" target="_blank" rel="noopener">
        <div class="icon-circle web">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="9" />
            <path d="M3 12h18" />
            <path d="M12 3a14 14 0 0 1 0 18" />
            <path d="M12 3a14 14 0 0 0 0 18" />
          </svg>
        </div>
        <div class="info-text">
          <div class="info-value">Website</div>
          <div class="info-sub">e-commint.com</div>
        </div>
        <span class="arrow">→</span>
      </a>
    </section>

    <button class="add-btn" id="addContactBtn" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4" />
        <path d="M4 21c0-4 4-7 8-7s8 3 8 7" />
      </svg>
      Kişi Ekle
    </button>
  </main>

  <script src="../assets/vcard.js"></script>
  <script>
    document.getElementById("addContactBtn").addEventListener("click", () => {
      downloadVCard({
        firstName: "Selin",
        lastName: "Tezel",
        org: "e-commint",
        email: "selin.tezel@e-commint.com",
        linkedin: "selintezelegitim",
        website: "https://e-commint.com/"
      });
    });
  </script>
</body>
</html>
